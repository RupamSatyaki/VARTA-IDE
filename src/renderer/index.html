<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP for Monaco Editor in Electron + Vite:
      - 'unsafe-eval' required for Monaco's JIT compilation
      - blob: required for Monaco web workers (Vite bundles them as blob URLs)
      - worker-src blob: allows spawning blob workers
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' blob:; script-src 'self' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; worker-src blob: 'self';" />
    <title>Varta</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
